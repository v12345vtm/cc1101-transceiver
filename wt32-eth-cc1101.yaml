# WIRING SCHEMATIC: ESP32 + CC1101 Transceiver Module
# =====================================================
#
# This YAML maps ESP32 GPIO pins (from your config) to standard CC1101 module 
# pins using typical silk screen labels found on CC1101 PCBs (8-pin header).
# 
# Standard CC1101 Module Pinout (Top View, 2x4 header):
# +-----------------------------+
# | 1:GND  | 2:VCC              |
# | 3:GDO0 | 4:CSN / SSN / CS   |
# | 5:SCK  | 6:MOSI / SI / SDA  |
# | 7:MISO | 8:GDO2             |
# +-----------------------------+  ANTENNA ----|
# 
# CONNECTIONS:
# ------------
# Wt32 DevKit Pin (Silk Label)  -->  CC1101 Module Pin (Silk Label)
# ---------------------------------------------
# 3V3 (3.3V pin)                       --> VCC (Pin 2)   # Power 3.3V (1.8-3.6V)
# GND (any ground pin)                 --> GND (Pin 1)   # Ground
# GPIO33  (silk: 485)                 --> GDO0 (Pin 3)         # TX output (Remote Transmitter)
# GPIO15                        --> CSN/CS/SSN (Pin 4)  # Chip Select
# GPIO14 (silk: )                  --> SCK/CLK (Pin 5)      # SPI Clock
# GPIO4 (silk: )                  --> MOSI/SI (Pin 6)      # SPI MOSI
# GPIO12 (silk: )             --> MISO/SO/GDO1 (Pin 7) # SPI MISO  
# GPIO32 (silk: CFG)                  --> GDO2 (Pin 8)         # RX input (Remote Receiver)
#
# NOTES:
# - Add 100nF decoupling capacitor between VCC/GND close to CC1101.
# - Antenna connects to the SMA/uFL connector on CC1101 module.
# - ESP32 board: "esp32dev" = standard ESP32 DevKit V1 with labeled GPIO pins.
# - Verify your specific CC1101 module pin labels match (some variations exist).
# - All GPIOs chosen are safe for ESP32 boot/WiFi usage.[web:3][web:17][web:20]

esphome:
  name: wt32c01
  friendly_name: wt32c01
 

esp32:
  board: esp32dev
  framework:
    type: arduino

#wifi: 
#  ssid:  !secret wifi_ssid
#  password: !secret wifi_password
  

 


ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk:
    pin: GPIO0
    mode: CLK_EXT_IN   # or CLK_OUT depending on your board specs
  phy_addr: 1
  power_pin: GPIO16
  id: eth

logger:

api:
 

ota:
  - platform: esphome
 

web_server:
  port: 80

# Globals to store learned signals
globals:
  - id: learned_code
    type: std::vector<int32_t>
    restore_value: no
  - id: learning_mode
    type: bool
    initial_value: 'false'
  - id: signal_learned
    type: bool
    initial_value: 'false'


# Example configuration entry for ESP32
i2c:
  sda: GPIO5
  scl: GPIO17
  scan: true
  id: bus_a

# SPI Bus
spi:
  clk_pin: GPIO14
  mosi_pin: GPIO4
  miso_pin: GPIO12

# CC1101 - Dual Pin Mode
cc1101:
  id: cc1101_module
  cs_pin: GPIO15
  frequency: 433.92MHz
  output_power: 10
  modulation_type: ASK/OOK
  symbol_rate: 5000
  filter_bandwidth: 200kHz

# Remote Receiver - connected to GDO2
remote_receiver:
  id: rf_receiver
  pin: GPIO32
  tolerance: 50%
  filter: 200us
  dump: all
  idle: 10ms
  on_raw:
    then:
      - lambda: |-
          // Log as single copyable line for YAML
          std::string code_str = "";
          for (int i = 0; i < x.size(); i++) {
            if (i > 0) code_str += ", ";
            code_str += std::to_string(x[i]);
          }
          ESP_LOGI("raw_code", "Pulses: %d", x.size());
          ESP_LOGI("raw_code", "Copy this line:");
          ESP_LOGI("raw_code", "[%s]", code_str.c_str());
          
          // Learning mode logic
          if (id(learning_mode)) {
            id(learned_code).clear();
            for (int32_t val : x) {
              id(learned_code).push_back(val);
            }
            id(signal_learned) = true;
            id(learning_mode) = false;
            
            std::string preview = "";
            int count = 0;
            for (int32_t val : id(learned_code)) {
              if (count > 0) preview += ", ";
              preview += std::to_string(val);
              count++;
              if (count >= 20) {
                preview += "... (" + std::to_string(id(learned_code).size()) + " total)";
                break;
              }
            }
            
            id(last_signal).publish_state(preview.c_str());
            id(learn_status).publish_state("Signal learned! " + std::to_string(id(learned_code).size()) + " pulses. Select slot to save.");
          }

# Remote Transmitter - connected to GDO0
remote_transmitter:
  id: rf_transmitter
  pin: GPIO33
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx: cc1101_module
  on_complete:
    then:
      - cc1101.begin_rx: cc1101_module

switch:
  - platform: template
    name: "Learning Mode"
    id: learning_mode_switch
    icon: "mdi:school"
    lambda: 'return id(learning_mode);'
    turn_on_action:
      - lambda: |-
          id(learning_mode) = true;
          id(learn_status).publish_state("Waiting for signal... Press remote now!");
      - logger.log: "Learning mode ON - press your remote"
    turn_off_action:
      - lambda: |-
          id(learning_mode) = false;
          id(learn_status).publish_state("Learning cancelled");
      - logger.log: "Learning mode OFF"

button:
  - platform: restart
    name: "Restart"

 
